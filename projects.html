<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سولارنا — در حال آماده‌سازی</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://solarna.ir/">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .coming-soon {
      min-height: 100svh;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; text-align: center; gap: 1.5rem;
      padding: 2rem;
    }
    .coming-soon__num {
      font-family: var(--f); font-size: clamp(6rem,18vw,14rem);
      font-weight: 900; color: transparent;
      -webkit-text-stroke: 1px rgba(10,10,10,.1);
      line-height: 1; letter-spacing: -.04em;
    }
  </style>
  <script>
    // Auto-redirect after 3 seconds
    setTimeout(() => window.location.href = 'index.html', 3000);
  </script>
</head>
<body>
<div class="coming-soon">
  <div class="coming-soon__num" aria-hidden="true">近</div>
  <div class="s-label">به زودی</div>
  <h1 class="h-title">صفحه پروژه‌ها<br>در حال آماده‌سازی است</h1>
  <p class="body-lg" style="max-width:380px">به زودی نمونه کارهای واقعی ما را اینجا می‌بینید. در حال انتقال به صفحه اصلی...</p>
  <a href="index.html" class="btn btn-ink">بازگشت به خانه</a>
</div>
<script src="js/components.js"></script>
<script src="js/main.js"></script>
</body>
</html>
